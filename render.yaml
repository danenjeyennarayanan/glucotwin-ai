services:
  # ── Flask ML Service ─────────────────────────────────────────────────────
  - type: web
    name: glucotwin-ml
    env: python
    region: oregon
    plan: free
    rootDir: glucotwin-ml
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers=2 --bind=0.0.0.0:$PORT --timeout=120 ml_service:app
    healthCheckPath: /health
    envVars:
      - key: MODEL_PATH
        value: model/diabetes_model.pkl
      - key: EXPLAINER_PATH
        value: model/shap_explainer.pkl
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        value: "*"