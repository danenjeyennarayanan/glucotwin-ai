services:
  # ── Spring Boot Backend ──────────────────────────────────────────────────
  - type: web
    name: glucotwin-backend
    env: docker
    region: oregon
    plan: free
    rootDir: glucotwin-backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health/ping
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ML_SERVICE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: EMAIL_ENABLED
        value: "false"
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false

  # ── Flask ML Service ─────────────────────────────────────────────────────
  - type: web
    name: glucotwin-ml
    env: python
    region: oregon
    plan: free
    rootDir: glucotwin-ml
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers=2 --bind=0.0.0.0:$PORT --timeout=120 ml_service:app
    healthCheckPath: /health
    envVars:
      - key: MODEL_PATH
        value: model/diabetes_model.pkl
      - key: EXPLAINER_PATH
        value: model/shap_explainer.pkl
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        sync: false