# ── Datasource ────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:changeme}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# ── JPA (NEVER use update in production; Flyway handles schema) ────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── Flyway ─────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ── JWT ────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:GlucoTwinAI_MustBe32CharsOrMoreForHS256_ChangeInProd!}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ── ML Service ─────────────────────────────────────────────────────────────
ml.service.url=${ML_SERVICE_URL:http://localhost:5001}
ml.service.timeout-seconds=30
ml.service.retry-attempts=2

# ── CORS ───────────────────────────────────────────────────────────────────
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

# ── Server ─────────────────────────────────────────────────────────────────
server.port=${PORT:8080}
spring.application.name=glucotwin-backend

# ── Actuator ───────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true
info.app.name=GlucoTwin AI
info.app.version=1.0.0
info.app.description=Diabetes risk prediction platform

# ── Logging ────────────────────────────────────────────────────────────────
logging.level.com.glucotwin=INFO
logging.level.org.springframework.security=WARN
logging.level.root=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ── Anthropic AI Chatbot ────────────────────────────────────────────────────
# Set ANTHROPIC_API_KEY environment variable for the AI chatbot to work.
# If not set, chatbot uses built-in fallback responses (still functional for demo).
anthropic.api.key=${ANTHROPIC_API_KEY:}
anthropic.model=claude-sonnet-4-20250514


# ── Email Service ──────────────────────────────────────────────────────────────
# Set to true and configure spring.mail.* to enable real email sending.
# In dev/demo mode (false), emails are logged to console instead.
app.email.enabled=${EMAIL_ENABLED:false}
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
