# Test configuration — overrides main application.properties
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.flyway.enabled=false

# JWT
jwt.secret=TestSecretKeyForJwtThatIsLongEnoughForHS256Algorithm!!
jwt.expiration=86400000

# ML Service
ml.service.url=http://localhost:5001
ml.service.timeout-seconds=5
ml.service.retry-attempts=1

# CORS — required by SecurityConfig @Value injection
cors.allowed-origins=http://localhost:3000

# Anthropic
anthropic.api.key=
anthropic.model=claude-sonnet-4-20250514

# Suppress noisy startup logs in tests
logging.level.root=WARN
logging.level.com.glucotwin=WARN
